name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}/yacht-dice:latest

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # 우선 ~/yacht-dice에서 docker-compose 파일 검색
          PROJECT_A=~/yacht-dice
          PROJECT_B=~/yacht      # 필요 시 실제 레포 경로로 변경

          if [ -f "$PROJECT_A/docker-compose.yml" ]; then
            COMPOSE_FILE="$PROJECT_A/docker-compose.yml"
            COMPOSE_DIR="$PROJECT_A"
          elif [ -f "$PROJECT_B/docker-compose.yml" ]; then
            COMPOSE_FILE="$PROJECT_B/docker-compose.yml"
            COMPOSE_DIR="$PROJECT_B"
          else
            echo "docker-compose.yml을 찾을 수 없습니다. 1) $PROJECT_A, 2) $PROJECT_B 경로 확인." >&2
            exit 1
          fi

          cd "$COMPOSE_DIR"
          docker-compose -f "$COMPOSE_FILE" down
          docker pull ghcr.io/${{ github.repository }}/yacht-dice:latest
          docker-compose -f "$COMPOSE_FILE" up -d

